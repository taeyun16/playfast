name: Version Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Create release commit and tag
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):')
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      PYTHONUTF8: "1"
    steps:
      - name: Check release token
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "RELEASE_TOKEN is required so pushed tags can trigger release.yml."
            echo "Use a fine-grained PAT or GitHub App token with contents:write."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install release dependencies
        run: uv sync --only-group release --no-install-project

      - name: Create release commit and tag
        run: uv run semantic-release version
