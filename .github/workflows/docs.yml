name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yaml'
      - 'README.md'
      - 'python/playfast/**/*.py'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  changes:
    name: Detect docs-relevant changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'mkdocs.yaml'
              - 'README.md'
              - 'python/playfast/**/*.py'
              - '.github/workflows/docs.yml'

  build:
    name: Build documentation
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git info

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (docs only)
        run: uv sync --only-group docs --no-install-project

      - name: Build documentation
        run: |
          uv run mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  required:
    name: Docs Required
    needs: [changes, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce docs result policy
        run: |
          if [ "${{ needs.changes.outputs.docs }}" != "true" ]; then
            echo "No docs-relevant changes. Marking required gate as passed."
            exit 0
          fi

          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Docs build did not pass: ${{ needs.build.result }}"
            exit 1
          fi

          echo "Docs build passed."
