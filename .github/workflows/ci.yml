name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'python/**'
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]

jobs:
  changes:
    name: Detect CI-relevant changes
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci:
              - 'python/**'
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'

  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary tests - full coverage
          - os: ubuntu-latest
            python-version: '3.11'
            run-tests: true
            build-profile: release
            with-coverage: true
          # Quick compatibility checks (dev profile — runtime correctness only,
          # release-level perf already verified by 3.11 job above)
          - os: ubuntu-latest
            python-version: '3.12'
            run-tests: true
            build-profile: dev
            with-coverage: false
          # macOS build verification
          - os: macos-latest
            python-version: '3.11'
            run-tests: false
            build-profile: dev
            with-coverage: false
          # Note: Windows CI removed - verified via release workflow
          # Windows users install pre-built wheels from PyPI

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          cache-on-failure: true
          shared-key: ${{ matrix.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      # Use mold linker for faster linking (50-70% speedup on Linux)
      - name: Setup mold linker
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      # Temporarily disabled due to GitHub Actions cache service issues
      # - name: Install sccache
      #   uses: mozilla-actions/sccache-action@v0.0.6

      - name: Install dependencies (CI test group only)
        run: uv sync --only-group ci-test

      - name: Build Rust extension
        run: |
          PROFILE="${{ matrix.build-profile }}"
          EXTRA_ARGS=""
          if [ "$PROFILE" != "dev" ]; then
            EXTRA_ARGS="--release"
          fi
          uv run maturin develop --profile "$PROFILE" $EXTRA_ARGS

      - name: Run tests
        if: matrix.run-tests
        run: |
          if [ "${{ matrix.with-coverage }}" = "true" ]; then
            uv run pytest --cov=python/playfast --cov-report=xml --cov-report=html --cov-fail-under=75
          else
            uv run pytest
          fi
        env:
          CI: "1"

      - name: Quick smoke test (build-only platforms)
        if: ${{ !matrix.run-tests }}
        run: uv run python -c "import playfast; print(f'playfast {playfast.__version__} imported successfully')"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: matrix.with-coverage
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Coverage Summary
        if: matrix.with-coverage
        run: |
          uv run python -m coverage report --show-missing --fail-under=75
        env:
          CI: "1"

      - name: Extract coverage percentage
        if: matrix.with-coverage
        id: coverage
        run: |
          COVERAGE=$(uv run python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); print(f\"{float(root.attrib['line-rate']) * 100:.1f}\")")
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Create coverage badge
        if: matrix.with-coverage && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: playfast-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          maxColorRange: 100
          minColorRange: 0

  lint:
    name: Lint and Format Check
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (CI lint group only)
        run: uv sync --only-group ci-lint --no-install-project

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

  required:
    name: CI Required
    needs: [changes, test, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce CI result policy
        run: |
          if [ "${{ needs.changes.outputs.ci }}" != "true" ]; then
            echo "No CI-relevant file changes. Marking required gate as passed."
            exit 0
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "CI test matrix did not pass: ${{ needs.test.result }}"
            exit 1
          fi

          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint job did not pass: ${{ needs.lint.result }}"
            exit 1
          fi

          echo "All CI jobs passed."
